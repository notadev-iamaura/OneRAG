server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/eot
        font/opentype
        font/otf
        image/svg+xml
        image/x-icon;

    # Vite는 pdfjs worker 등 ESM 워커 자산을 .mjs로 내보낸다.
    # Alpine nginx는 .mjs를 application/octet-stream으로 줄 수 있는데,
    # 그러면 nosniff 정책 하에서 브라우저가 모듈 로드를 거부한다(PDF 인용 미리보기 깨짐).
    location ~* \.mjs$ {
        types {
            application/javascript mjs;
        }
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 런타임 config.js는 배포/설정 변경 시 항상 최신을 받아야 하므로 캐시하지 않는다.
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    # ============================================================
    # same-origin API/WS 리버스 프록시.
    # 런타임 API_BASE_URL / WS_BASE_URL을 비우면 프론트가 상대 경로로 호출하고,
    # 아래 프록시가 백엔드(${API_PROXY_PASS})로 중계한다.
    # API_PROXY_PASS는 entrypoint.sh가 envsubst로 치환한다(기본 http://backend:8000).
    # ============================================================

    # 프론트 헬스 프록시(/api/health → 백엔드 /health). 운영 헬스체크/디버깅용.
    location = /api/health {
        proxy_pass ${API_PROXY_PASS}/health;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 관리자 실시간 메트릭 WebSocket(/api/admin/ws). Upgrade 헤더 처리 필수.
    location /api/admin/ws {
        proxy_pass ${API_PROXY_PASS}/api/admin/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 양방향 채팅 WebSocket(/chat-ws). Upgrade 헤더 처리 필수.
    location /chat-ws {
        proxy_pass ${API_PROXY_PASS}/chat-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 일반 REST API 프록시(/api/...). 문서 업로드 대비 본문 크기 상향, SSE 대비 버퍼링 해제.
    location /api/ {
        client_max_body_size 32m;
        proxy_pass ${API_PROXY_PASS}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # SPA 라우팅을 위한 설정
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더 추가.
    # X-Frame-Options는 frame-ancestors와 충돌하므로 기본 미설정이며,
    # 레거시 호환이 필요할 때만 entrypoint.sh가 ${FRAME_OPTIONS_HEADER}를 채운다.
    # frame-ancestors는 ${FRAME_ANCESTORS}(기본 'self')로 임베드 허용 출처를 제어한다.
    ${FRAME_OPTIONS_HEADER}
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:; frame-ancestors ${FRAME_ANCESTORS};" always;

    # Health check endpoint(프론트 컨테이너 자체 liveness)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

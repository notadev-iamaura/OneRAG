# OneRAG production compose profile.
# Requires explicit secrets from the deployment environment.

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.8
    restart: unless-stopped
    expose:
      - "8080"
      - "50051"
    environment:
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: 1
      ENABLE_TOKENIZER_KAGOME_KR: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEY:?Set WEAVIATE_API_KEY}"
      AUTHENTICATION_APIKEY_USERS: "${WEAVIATE_API_USER:-onerag}"
      QUERY_DEFAULTS_LIMIT: 25
      LOG_LEVEL: "info"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LOCAL_EMBEDDING_DEPS: "${INSTALL_LOCAL_EMBEDDING_DEPS:-false}"
        PRELOAD_LOCAL_EMBEDDING_MODEL: "${PRELOAD_LOCAL_EMBEDDING_MODEL:-false}"
        INSTALL_PLAYWRIGHT_BROWSERS: "${INSTALL_PLAYWRIGHT_BROWSERS:-false}"
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      WEAVIATE_URL: "http://weaviate:8080"
      WEAVIATE_GRPC_HOST: "weaviate"
      WEAVIATE_GRPC_PORT: "50051"
      WEAVIATE_API_KEY: "${WEAVIATE_API_KEY:?Set WEAVIATE_API_KEY}"
      ENVIRONMENT: "production"
      NODE_ENV: "production"
      RETRIEVAL_STARTUP_POLICY: "${RETRIEVAL_STARTUP_POLICY:-required}"
      FASTAPI_AUTH_KEY: "${FASTAPI_AUTH_KEY:?Set FASTAPI_AUTH_KEY}"
      EMBEDDINGS_PROVIDER: "${EMBEDDINGS_PROVIDER:-openrouter}"
      LLM_PROVIDER: "${LLM_PROVIDER:-google}"
      LLM_MODEL: "${LLM_MODEL:-gemini-2.0-flash}"
      GENERATION_PROVIDER: "${GENERATION_PROVIDER:-google}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      START_BATCH_CRAWLER: "${START_BATCH_CRAWLER:-false}"
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      PORT: "80"
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:?Set VITE_API_BASE_URL}"
      VITE_WS_BASE_URL: "${VITE_WS_BASE_URL:?Set VITE_WS_BASE_URL}"
      VITE_ACCESS_CODE: "${VITE_ACCESS_CODE:?Set VITE_ACCESS_CODE}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  weaviate_data:
    name: onerag_prod_weaviate_data

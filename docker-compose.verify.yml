# 통합 검증 전용 인프라 (Weaviate + PostgreSQL/pgvector + Qdrant)
# ===================================================
# 목적: 정적 게이트(lint/mypy/test)를 넘어 실제 외부 서비스 연결로 integration
#       테스트를 돌리기 위한 로컬 스택입니다. 컨테이너 가능한 vector DB
#       프로바이더(Weaviate, pgvector, Qdrant)를 실연결로 검증합니다.
#
# 포트: dev 스택(docker-compose.yml, make start)과 동시 실행이 가능하도록
#       호스트 포트를 리맵했습니다 (8081/50052/55432/16333/16334).
#       restart: "no" — 검증 전용 일회성 스택이므로 데몬 재시작 시 부활하지 않습니다.
#
# 사용:
#   make verify-integration            # 전체 (서비스 기동 → 대기 → 테스트 → 종료)
#   docker compose -f docker-compose.verify.yml up -d     # 서비스만 기동
#   docker compose -f docker-compose.verify.yml down -v   # 종료 + 볼륨 삭제
#
# 환경변수(테스트 실행 시):
#   WEAVIATE_URL=http://localhost:8081
#   WEAVIATE_GRPC_PORT=50052
#   DATABASE_URL=postgresql://onerag:onerag-verify@localhost:55432/rag_db
#   QDRANT_URL=http://localhost:16333

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.8
    container_name: onerag-verify-weaviate
    restart: "no"
    ports:
      - "8081:8080"  # HTTP API (dev 스택 8080과 충돌 방지)
      - "50052:50051"  # gRPC (Python client v4, dev 스택 50051과 충돌 방지)
    environment:
      ENABLE_TOKENIZER_KAGOME_KR: 'true'  # 한국어 토크나이저
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      QUERY_DEFAULTS_LIMIT: 25
      LOG_LEVEL: 'info'
    volumes:
      - verify_weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  postgres:
    # pgvector 확장이 포함된 공식 이미지 — postgres:16과 완전 호환되므로
    # 같은 컨테이너가 세션 영속화 테스트와 pgvector VectorStore 검증을 겸용한다.
    image: pgvector/pgvector:pg16
    container_name: onerag-verify-postgres
    restart: "no"
    ports:
      - "55432:5432"  # dev/로컬 PostgreSQL 5432와 충돌 방지
    environment:
      POSTGRES_USER: onerag
      POSTGRES_PASSWORD: onerag-verify
      POSTGRES_DB: rag_db
    volumes:
      - verify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onerag -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  qdrant:
    # 안정 버전 태그 고정 (latest 금지) — v1.18.2는 2026-06 기준 최신 안정 릴리즈
    image: qdrant/qdrant:v1.18.2
    container_name: onerag-verify-qdrant
    restart: "no"
    ports:
      - "16333:6333"  # HTTP API (dev 스택 기본 6333과 충돌 방지)
      - "16334:6334"  # gRPC (dev 스택 기본 6334와 충돌 방지)
    volumes:
      - verify_qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant 이미지(debian:13-slim 기반)에는 curl/wget이 없어 /readyz HTTP 호출이
      # 불가하다. entrypoint가 bash 스크립트라 bash는 존재하므로, bash 내장
      # /dev/tcp 의사 디바이스로 HTTP 포트(6333) TCP 연결을 검사한다.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  verify_weaviate_data:
    name: onerag_verify_weaviate_data
  verify_postgres_data:
    name: onerag_verify_postgres_data
  verify_qdrant_data:
    name: onerag_verify_qdrant_data

name: LLM Cost Analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-analysis:
    # This job posts PR comments, so only run it for branches inside this repo.
    # Fork PRs still get the normal CI matrix without handing write-capable
    # tokens to a third-party composite action.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: Jwrede/tokentoll@ee3d1bd004690330436da6516318e0a20f9fb86b  # v0.8.3

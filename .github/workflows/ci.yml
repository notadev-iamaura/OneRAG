# OneRAG CI/CD Pipeline
#
# 트리거: main 브랜치 push 및 모든 PR
# 검증 항목: 백엔드 린트/타입체크/아키텍처/테스트, 프론트엔드 빌드/린트/테스트
# 최적화: 의존성 캐싱, 타임아웃 설정

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PR에서 동일 브랜치의 이전 실행 취소 (리소스 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 린트 검사 (Ruff)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .

  # ============================================
  # 타입 체크 (Mypy)
  # ============================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Mypy
        run: uv run mypy .

  # ============================================
  # 아키텍처 검증 (Import Linter)
  # ============================================
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Import Linter
        run: uv run lint-imports

  # ============================================
  # 테스트 및 커버리지 (Pytest) - 30분 타임아웃
  # ============================================
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Tests with Coverage
        run: uv run pytest -p pytest_cov --cov=app --cov-report=html --cov-report=xml --tb=short -q --timeout=60 --ignore=tests/integration

      # P0 회귀 테스트: DI 컨테이너 배선 / async Singleton Future 해소 / OpenAI 호환 RAG 검색.
      # 기본 테스트 스텝이 tests/integration을 ignore하고, verify 스크립트는 -m integration으로
      # deselect되어 어떤 게이트에서도 실행되지 않던 결함을 막기 위해 명시적으로 실행한다.
      # 세 테스트 모두 외부 서비스(docker/Weaviate) 없이 ENVIRONMENT=test로 통과한다.
      - name: Run wiring regression tests (P0)
        run: uv run pytest tests/integration/api/test_container_wiring.py tests/integration/api/test_openai_compat_rag.py tests/integration/api/test_grok_agent_wiring.py -q --timeout=60

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          if-no-files-found: error
          retention-days: 7

  # ============================================
  # Optional Provider 테스트 (Vector DB / BM25 / Reranker / Embedder)
  # ------------------------------------------------------------------
  # 기본 Test 게이트는 tests/conftest.py 의 pytest_ignore_collect 로
  # optional-provider 단위 테스트를 수집 제외한다. 이 잡은 optional extras 를
  # 설치하고 ONERAG_RUN_OPTIONAL_PROVIDER_TESTS=1 로 tests/unit 전체를 실행해,
  # provider/reranker/bm25/embedder 단위 테스트의 staleness 를 자동 차단한다.
  #
  # [단일 진실원] 제외 경로 목록은 tests/conftest.py 의 OPTIONAL_PROVIDER_TEST_PATHS
  # 가 단일 진실원이다 — 여기에 경로를 중복 명시하지 말 것.
  # ONERAG_RUN_OPTIONAL_PROVIDER_TESTS=1 이면 conftest 가 optional 경로를 수집에
  # 포함하므로, 이 잡은 tests/unit 전체 실행만으로 optional 경로를 빠짐없이 커버한다.
  # (기본 Test 잡과 일부 실행이 중복되지만, extras 설치 환경에서 전체 unit 테스트를
  # 검증한다는 가치가 있어 의도적으로 허용한다.)
  #
  # all-vectordb: chroma/pinecone/qdrant/pgvector, bm25: kiwipiepy/rank-bm25,
  # local-embedding: sentence-transformers(reranker wiring 테스트). weaviate/mongodb
  # 는 base 의존성으로 충족된다. (pgvector store 테스트는 psycopg v3 미설치 시 self-skip)
  #
  # 결정성(determinism) 정책: 이 게이트는 외부 네트워크에 의존하지 않는다.
  #   - test_local_reranker.py 는 initialize()/rerank() 에서 실제 CrossEncoder 모델을
  #     HF 에서 받아 추론하는 실모델 테스트라, 파일 스스로
  #     ONERAG_RUN_REAL_MODEL_TESTS=1 게이트(skipif)로 기본 skip 을 선언한다
  #     (--ignore 불필요). LocalReranker 의 wiring(=lazy 생성)은
  #     test_reranker_factory_v2 가 커버하고, 실모델 추론 검증은
  #     integration verification(make verify-integration)에서 수행한다.
  #   - HF_HUB_OFFLINE=1 / TRANSFORMERS_OFFLINE=1 은 벨트앤서스펜더(이중 방어)로
  #     유지한다 — 게이트가 누락된 새 테스트가 들어와도 HF 다운로드를 차단한다.
  # ============================================
  optional-providers:
    name: Optional Providers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: test
      ONERAG_RUN_OPTIONAL_PROVIDER_TESTS: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-optional-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-optional-${{ runner.os }}-

      - name: Install dependencies (optional providers)
        run: uv sync --frozen --extra dev --extra all-vectordb --extra bm25 --extra local-embedding

      # 경로 목록을 명시하지 않는다 — conftest 단일 진실원 (위 주석 참조)
      - name: Run optional-provider tests
        run: uv run pytest tests/unit -q --timeout=120 --tb=short

  # ============================================
  # 운영 안정성 Smoke (runtime 계약 + Docker config)
  # ============================================
  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run operational smoke
        run: make test-operational-smoke

  # ============================================
  # 프론트엔드 검증 (Vite + ESLint + Vitest)
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:warning-gate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:warning-gate

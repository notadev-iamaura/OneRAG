# OneRAG CI/CD Pipeline
#
# 트리거: main 브랜치 push 및 모든 PR
# 검증 항목: 백엔드 린트/타입체크/아키텍처/테스트, 프론트엔드 빌드/린트/테스트
# 최적화: 의존성 캐싱, 타임아웃 설정

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PR에서 동일 브랜치의 이전 실행 취소 (리소스 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 린트 검사 (Ruff)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .

  # ============================================
  # 타입 체크 (Mypy)
  # ============================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Mypy
        run: uv run mypy .

  # ============================================
  # 아키텍처 검증 (Import Linter)
  # ============================================
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Import Linter
        run: uv run lint-imports

  # ============================================
  # 테스트 및 커버리지 (Pytest) - 30분 타임아웃
  # ============================================
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Tests with Coverage
        run: uv run pytest -p pytest_cov --cov=app --cov-report=html --cov-report=xml --tb=short -q --timeout=60 --ignore=tests/integration

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          if-no-files-found: error
          retention-days: 7

  # ============================================
  # Optional Provider 테스트 (Vector DB / BM25 / Reranker / Embedder)
  # ------------------------------------------------------------------
  # 기본 Test 게이트는 conftest 의 pytest_ignore_collect 로 optional-provider
  # 단위 테스트(tests/unit/retrieval/retrievers, rerankers, bm25_engine,
  # infrastructure/storage/vector)를 수집 제외한다. 이 잡은 해당 extras 를
  # 설치하고 ONERAG_RUN_OPTIONAL_PROVIDER_TESTS=1 로 그 경로를 실제 실행해,
  # provider/reranker/bm25/embedder 단위 테스트의 staleness 를 자동 차단한다.
  #
  # all-vectordb: chroma/pinecone/qdrant/pgvector, bm25: kiwipiepy/rank-bm25,
  # local-embedding: sentence-transformers(reranker wiring 테스트). weaviate/mongodb
  # 는 base 의존성으로 충족된다. (pgvector store 테스트는 psycopg v3 미설치 시 self-skip)
  #
  # 결정성(determinism) 정책: 이 게이트는 외부 네트워크에 의존하지 않는다.
  #   - HF_HUB_OFFLINE=1 / TRANSFORMERS_OFFLINE=1 로 HuggingFace 다운로드를 차단한다.
  #   - test_local_reranker.py 는 initialize()/rerank() 에서 실제 CrossEncoder 모델을
  #     HF 에서 받아 추론하는 통합 성격이라 제외한다(429 rate-limit 등 flaky 원인).
  #     LocalReranker 의 wiring(=lazy 생성)은 test_reranker_factory_v2 가 커버한다.
  #     실모델 추론 검증은 integration verification(make verify-integration)에서 수행.
  # ============================================
  optional-providers:
    name: Optional Providers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: test
      ONERAG_RUN_OPTIONAL_PROVIDER_TESTS: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-optional-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-optional-${{ runner.os }}-

      - name: Install dependencies (optional providers)
        run: uv sync --frozen --extra dev --extra all-vectordb --extra bm25 --extra local-embedding

      - name: Run optional-provider tests
        run: |
          uv run pytest \
            tests/unit/infrastructure/storage/vector \
            tests/unit/retrieval/bm25_engine \
            tests/unit/retrieval/rerankers \
            tests/unit/retrieval/retrievers \
            --ignore=tests/unit/retrieval/rerankers/test_local_reranker.py \
            --tb=short -q --timeout=120

  # ============================================
  # 운영 안정성 Smoke (runtime 계약 + Docker config)
  # ============================================
  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run operational smoke
        run: make test-operational-smoke

  # ============================================
  # 프론트엔드 검증 (Vite + ESLint + Vitest)
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:warning-gate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:warning-gate

# Railway Configuration File
# 기능: Railway 데모 백엔드 배포 설정 (경량 Dockerfile.demo 사용)
# 문서: https://docs.railway.app/reference/config-as-code

[build]
# 데모 전용 경량 Dockerfile (torch/sentence-transformers 제외, ~300MB)
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile.demo"

[deploy]
# Health check 설정
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
# 기본 환경 변수 (민감하지 않은 값만)
# 민감한 값(GOOGLE_API_KEY 등)은 Railway Dashboard에서 설정
PORT = "8000"
PYTHONUNBUFFERED = "1"

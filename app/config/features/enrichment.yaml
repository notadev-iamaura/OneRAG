# LLM 문서 보강 설정
# 문서 로드 시 LLM을 사용하여 메타데이터를 자동 생성
#
# 소비자: app/modules/core/enrichment/services/enrichment_service.py
#   - EnrichmentService._parse_enrichment_config → enabled, llm.*, batch.*,
#     timeout.*, retry.max_attempts, cache.enabled, quality.*
#   - EnrichmentService._get_openai_api_key      → llm.api_key (1순위)
# 아래 기본값(환경변수 미설정 시)은 EnrichmentConfig 코드 기본값과 동일하다 —
# import만으로 동작이 바뀌지 않으며, 환경변수/yaml 수정으로 운영자가 제어한다.

enrichment:
  # 보강 기능 활성화 여부 (기본값: false - 추후 고도화 완료 후 true로 변경)
  enabled: ${ENRICHMENT_ENABLED:-false}

  # LLM 설정
  llm:
    # 사용할 LLM 모델 (gpt-4o-mini 권장 - 비용 효율적)
    model: ${ENRICHMENT_LLM_MODEL:-gpt-4o-mini}

    # 온도 설정 (0.0-1.0, 낮을수록 일관된 결과)
    temperature: ${ENRICHMENT_LLM_TEMPERATURE:-0.1}

    # 최대 토큰 수
    max_tokens: ${ENRICHMENT_LLM_MAX_TOKENS:-1000}

    # API 키 (OpenAI API 키 재사용)
    # 주의: `:-` 기본값(빈 문자열)이 반드시 필요하다. `${OPENAI_API_KEY}` 형태는
    # 환경변수 미설정 시 미치환 리터럴로 남아 truthy가 되고,
    # _get_openai_api_key가 가짜 키를 반환해 폴백 체인(generation/llm)이 끊긴다.
    api_key: ${OPENAI_API_KEY:-}

  # 배치 처리 설정
  batch:
    # 배치 크기 (한 번에 처리할 문서 수)
    size: ${ENRICHMENT_BATCH_SIZE:-10}

    # 동시 처리 수 (병렬 처리)
    concurrency: ${ENRICHMENT_CONCURRENCY:-3}

  # 타임아웃 설정 (초 단위)
  timeout:
    # 단건 처리 타임아웃
    single: ${ENRICHMENT_TIMEOUT_SINGLE:-30}

    # 배치 처리 타임아웃
    batch: ${ENRICHMENT_TIMEOUT_BATCH:-90}

  # 재시도 설정
  retry:
    # 최대 재시도 횟수
    max_attempts: ${ENRICHMENT_MAX_RETRIES:-3}

    # 재시도 간격 (초)
    initial_delay: 1

    # 지수 백오프 계수
    backoff_factor: 2

  # 캐싱 설정
  cache:
    # 캐싱 활성화 여부
    enabled: ${ENRICHMENT_CACHE_ENABLED:-false}

    # 캐시 TTL (초, 24시간)
    ttl: ${ENRICHMENT_CACHE_TTL:-86400}

  # 품질 설정
  quality:
    # 최소 신뢰도 점수 (0.0-1.0)
    min_confidence: ${ENRICHMENT_MIN_CONFIDENCE:-0.0}

    # 보강 실패 시 원본 사용 여부
    fallback_to_original: true

  # 로깅 설정
  logging:
    # 성공률 추적
    track_success_rate: true

    # 실패한 문서 ID 저장 (재처리용)
    save_failed_ids: true

    # 토큰 사용량 추적
    track_token_usage: true

  # 프롬프트 설정
  # 소비자: app/modules/core/enrichment/services/enrichment_service.py
  #   _parse_enrichment_config → enrichment.prompt.{system_prompt,few_shot_examples,
  #   user_prompt_template,include_examples} → EnrichmentConfig → 프롬프트 빌더로 전달.
  # 아래 system_prompt/few_shot_examples/user_prompt_template가 null(기본)이면
  # enrichment_prompts.py의 코드 내장 한국어 기본 프롬프트를 그대로 사용한다
  # → 미설정 시 LLM 동작 변화 없음(회귀 0).
  prompt:
    # 프롬프트 버전 (메타데이터, 추적용)
    version: "v1"

    # Few-shot 예시 개수 (메타데이터, 추적용)
    num_examples: 2

    # ----------------------------------------
    # 프롬프트 오버라이드 (코드 포크 없이 언어/도메인별 프롬프트 교체)
    # ----------------------------------------
    # 비한국어/타도메인 코퍼스는 아래 값을 채워 메타데이터 추출 프롬프트와
    # 카테고리 라벨(기술/비즈니스 등)을 해당 언어/도메인으로 전환한다.
    #
    # ⚠️ user_prompt_template 오버라이드 시 {content} 플레이스홀더 보존 필수.
    # ⚠️ batch_user_prompt_template 오버라이드 시 {doc_count}, {batch_content} 보존 필수.
    #    (단건과 출력 형식이 다르므로 — 단건=JSON 객체, 배치=JSON 배열 — 별도 키로 관리.
    #     단건만 오버라이드하면 배치 경로는 코드 내장 한국어 기본값을 그대로 쓴다.)
    #
    # 사용 예시(영어 프롬프트로 교체):
    #   system_prompt: |
    #     You are an AI assistant that extracts metadata from text...
    #   few_shot_examples: |
    #     Example 1: ...
    #   user_prompt_template: |
    #     Analyze the following text and extract metadata as JSON:
    #     {content}
    #   batch_user_prompt_template: |
    #     Analyze the following {doc_count} texts and respond as a JSON array:
    #     {batch_content}
    system_prompt: null               # 시스템 프롬프트 (null=코드 내장 한국어 기본값)
    few_shot_examples: null           # Few-shot 예시 블록 (null=코드 내장 기본값)
    user_prompt_template: null        # 단건 사용자 프롬프트 ({content} 보존, null=코드 내장 기본값)
    batch_user_prompt_template: null  # 배치 사용자 프롬프트 ({doc_count}, {batch_content} 보존, null=코드 내장 기본값)
    include_examples: true            # Few-shot 예시 포함 여부 (기존 동작 보존)

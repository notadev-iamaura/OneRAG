# 배치 크롤링 설정 (Hybrid Mode)
# ================================
# 아키텍처:
# - 구조화 데이터 소스: 외부 API 연동 (Notion 등 선택적 모듈)
# - 외부 소스: ExternalCrawler (Playwright 기반 크롤링)

batch:
  # 배치 실행 모드
  mode: hybrid  # hybrid | structured_only | external_only

  # 청크 설정
  chunking:
    chunk_size: 1000
    chunk_overlap: 200
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - " "

  # 구조화 데이터 소스 설정 (Notion 등 선택적 모듈)
  structured_source:
    enabled: true
    # 데이터베이스 ID (카테고리별)
    databases:
      # NOTE: 실제 값은 외부 데이터 소스의 Database ID로 교체하세요.
      domain_1: "${STRUCTURED_DB_ID_DOMAIN_1:-}"
      domain_2: "${STRUCTURED_DB_ID_DOMAIN_2:-}"
      domain_3: "${STRUCTURED_DB_ID_DOMAIN_3:-}"

    # Rate Limiting (API 제한)
    rate_limit:
      requests_per_second: 3
      retry_attempts: 3
      retry_delay_seconds: 1

    # 페이지 처리 옵션
    page_processing:
      include_child_pages: true
      max_depth: 2
      timeout_seconds: 30

  # 외부 크롤링 소스 설정 (Playwright)
  external:
    enabled: true
    sources:
      - name: external_source_1
        url: "https://example.com"
        content_selector: "main, article, .content"
        max_depth: 2
        timeout_seconds: 60

      - name: external_source_2
        url: "https://example.org"
        content_selector: "main, article, .content"
        max_depth: 2
        timeout_seconds: 60

    # Playwright 옵션
    playwright:
      headless: true
      timeout_ms: 30000
      wait_for_selector: "body"
      scroll_delay_ms: 500
      max_scrolls: 10

  # Weaviate 업로드 설정
  weaviate:
    collection_name: "Documents"
    batch_size: 100
    # 업로드 전 기존 데이터 삭제 여부
    delete_before_upload: true

  # PostgreSQL 로그 설정
  logging:
    enabled: true
    log_level: INFO
    # 실패 로그 에러 메시지 최대 길이
    max_error_length: 1000

  # 성공률 임계값 (이하 시 실패 처리)
  success_threshold: 60  # 5개 소스 중 3개 이상 성공 필요

  # 스케줄링 (Railway 자동 실행)
  schedule:
    run_on_startup: ${RUN_BATCH_ON_STARTUP:-false}
    cron: "0 3 * * *"  # 매일 새벽 3시 (KST)

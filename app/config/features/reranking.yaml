# 리랭킹 설정 v2.1
# 3단계 계층 구조: approach → provider → model
#
# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  approach (기술 방식)                                                  ║
# ╠═══════════════════════════════════════════════════════════════════════╣
# ║  - llm:              범용 LLM 기반 리랭킹 (언어 이해력 활용)           ║
# ║  - cross-encoder:    전용 리랭커 API (쿼리+문서 쌍 인코딩)            ║
# ║  - late-interaction: ColBERT 방식 (토큰 레벨 상호작용)                ║
# ║  - local:            로컬 모델 (API 키 불필요, 오프라인 사용 가능)     ║
# ╠═══════════════════════════════════════════════════════════════════════╣
# ║  provider (서비스 제공자)                                              ║
# ╠═══════════════════════════════════════════════════════════════════════╣
# ║  llm:              google, openai, openrouter                         ║
# ║  cross-encoder:    jina, cohere                                       ║
# ║  late-interaction: jina                                               ║
# ║  local:            sentence-transformers                              ║
# ╚═══════════════════════════════════════════════════════════════════════╝

reranking:
  enabled: true
  min_score: 0.0  # 기본값 (환경별 설정: environments/*.yaml에서 오버라이드)

  # ========================================
  # 리랭크 fusion guardrail (#33)
  # ========================================
  # 리랭커(특히 semantic)가 BM25/exact-match 등 원본 lexical/hybrid 신호를 덮어
  # 식별자·모델코드·연도 문서를 하위로 미는 도메인 무관 문제를 막는다.
  # 리랭커 top1을 보존(recall@1 유지)하면서 original_score 높은 하위 후보를 상위로
  # 재삽입(recall@5/MRR 개선)한다. provider 무관 opt-in이며 기본 비활성화.
  fusion:
    enabled: "${RERANKING_FUSION_ENABLED:-false}"
    # 전략명: 리랭커 top-k 보존 + 원본 신호 top-k 재삽입
    strategy: "${RERANKING_FUSION_STRATEGY:-rerank_top1_original_top3}"
    # 보존할 리랭커 상위 개수(top1 기본)
    preserve_rerank_top_k: "${RERANKING_FUSION_PRESERVE_RERANK_TOP_K:-1}"
    # 재삽입할 원본 신호 상위 개수
    original_top_k: "${RERANKING_FUSION_ORIGINAL_TOP_K:-3}"

  # ========================================
  # 기본 설정
  # ========================================
  # 출하 기본값: GOOGLE_API_KEY만으로 동작하는 조합 (quickstart 호환)
  # GOOGLE_API_KEY 부재 시에도 graceful degradation으로 리랭킹 없이 동작합니다.
  approach: "llm"     # llm | cross-encoder | late-interaction | local
  provider: "google"  # approach에 따라 유효한 provider 선택

  # (선택) 더 빠른 토큰 레벨 리랭킹을 원하면 아래 조합으로 변경하세요.
  # 단, JINA_API_KEY 환경변수가 반드시 필요합니다 (https://jina.ai/).
  # approach: "late-interaction"
  # provider: "jina"

  # ========================================
  # Provider별 설정
  # ========================================

  # Google (Gemini) - LLM approach용
  google:
    model: "gemini-flash-lite-latest"
    max_documents: 20
    timeout: 15

  # OpenAI - LLM approach용
  openai:
    model: "gpt-5-nano"
    max_documents: 20
    timeout: 15
    verbosity: "low"
    reasoning_effort: "minimal"

  # OpenRouter - LLM approach용
  openrouter:
    model: "google/gemini-2.5-flash-lite"
    max_documents: 20
    timeout: 15

  # Jina - cross-encoder 및 late-interaction용
  # approach에 따라 적절한 모델 자동 선택
  jina:
    # cross-encoder용: jina-reranker-v2-base-multilingual
    # late-interaction용: jina-colbert-v2
    model: "jina-colbert-v2"
    top_n: 10
    timeout: 30
    max_documents: 20

  # Cohere - cross-encoder용
  # 100+ 언어 지원, 강력한 다국어 리랭킹
  cohere:
    model: "rerank-multilingual-v3.0"
    top_n: 10
    timeout: 30

  # Sentence-Transformers - local용
  # API 키 불필요, 오프라인 사용 가능
  # 설치: uv sync --extra local-reranker
  sentence-transformers:
    model: "cross-encoder/ms-marco-MiniLM-L-12-v2"  # 130MB, 정확
    # 대안: "cross-encoder/ms-marco-MiniLM-L-6-v2"  # 90MB, 빠름
    batch_size: 32

# ========================================
# approach 선택 가이드
# ========================================
#
# 🎯 빠른 응답 필요 (실시간 채팅):
#   → approach: late-interaction, provider: jina
#   → 토큰 레벨 매칭으로 빠르면서 정확
#
# 🧠 깊은 이해 필요 (복잡한 질문):
#   → approach: llm, provider: google
#   → LLM의 언어 이해력 활용
#
# ⚖️ 균형 (일반 검색):
#   → approach: cross-encoder, provider: jina
#   → 전용 리랭커로 안정적 품질
#
# 🌍 다국어 지원 필요 (100+ 언어):
#   → approach: cross-encoder, provider: cohere
#   → Cohere의 강력한 다국어 모델
#
# 💻 API 키 없이 로컬 실행:
#   → approach: local, provider: sentence-transformers
#   → 오프라인 사용 가능, 빠른 추론

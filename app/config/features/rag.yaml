# RAG 파이프라인 설정
# 기능: 문서 검색, 청킹, 리랭킹 등 RAG 핵심 파라미터 설정
# 사용: retrieval, document_processing, rag 모듈 설정

# Retrieval Configuration (RootConfig 필수 필드)
retrieval:
  max_sources: 8
  # RRF 점수 범위: 0.01~0.04 (정규화 전)
  # 0.05 → 모든 문서 필터링됨! 0.01로 완화
  min_score: 0.01
  hybrid_alpha: 0.6
  top_k: 8

  # 질의 특성 기반 동적 하이브리드 alpha (#35)
  # lexical(모델코드/숫자/코드) 질의에서 BM25 가중을 강화해 정확 토큰 매칭을 보존한다.
  # 하이브리드 지원 retriever(weaviate/pinecone/qdrant)에만 효과가 있고
  # dense-only(pgvector/mongodb)에는 무영향이다. 기본 비활성화(하위 호환).
  dynamic_alpha:
    enabled: false
    # lexical 질의에 적용할 낮은 alpha(BM25 가중 강화). 0=BM25만, 1=Vector만.
    lexical_alpha: 0.4
    # 도메인/언어 특화 lexical 패턴(정규식)을 코드 수정 없이 추가 주입한다.
    # 언어 중립 기본 패턴(숫자/모델코드)에 `|`로 합성된다.
    # 예(일본어): ["円台", "第\\d+条"] / 예(코드): ["[A-Z]{3,}_[A-Z]+"]
    extra_patterns: []

rag:
  enabled: true
  use_rerank: false
  reranker_model: "jina"
  top_k: 8
  rerank_top_k: 8
  relevance_threshold: 0.5

  # ⚠️ source_boost는 scoring.file_type_weights로 마이그레이션됨
  # 자세한 내용은 아래 'scoring' 섹션 참조

  # 검색 hit 주변 청크를 생성 컨텍스트에 포함하는 opt-in 옵션
  # 기본값은 비활성화하여 기존 검색/소스 동작을 유지
  context_expansion:
    enabled: false
    window: 1
    max_window: 3

  # ==========================================================================
  # 파이프라인 타임아웃 예산 (SLA Budget) - opt-in
  # ==========================================================================
  # 각 stage에 개별 deadline을, 전체에 총 budget을 부여해 무한 대기를 막는다.
  # 개별 stage cap은 단일 stage 무한정 hang을 막고, total budget은 전체 누적
  # 지연을 막는 이중 안전장치다(개별 합이 total을 넘을 수 있는 것은 의도된 패턴).
  #
  # 기본 OFF: enabled=false면 wait_for 래핑을 전부 건너뛰어 기존 동작(무제한)을
  # 유지한다(회귀 안전판). 값이 비정상(0 이하/숫자 아님)이면 해당 항목은 무제한.
  #
  # 운영 조정 가이드(실가동 검증값 예시):
  #   - total_budget_seconds는 프론트 HTTP 타임아웃보다 "작게" 잡아 프론트가
  #     먼저 끊는 일을 막는다 (예: 프론트 300초 → total 270초)
  #   - generate_answer는 generation.yaml의 LLM 최대 timeout과 동일하게 맞춰
  #     정상 장문 생성이 stage deadline에 끊기지 않게 한다
  pipeline_timeout:
    enabled: false
    # 전체 파이프라인 총 예산(초). 통짜(REST /chat) 경로에 적용.
    total_budget_seconds: 270
    # 스트리밍(SSE/WS) 전용 총 예산(초). 장수명 연결이므로 통짜보다 넉넉하게.
    # 미설정이면 무제한(stage deadline만 적용).
    stream_total_budget_seconds: 600
    # stage별 deadline(초). 각 stage는 asyncio.wait_for로 이 값만큼만 대기한다.
    stages:
      route_query: 45        # 라우팅(LLM 분류)
      prepare_context: 45    # 멀티턴 재작성 + 쿼리 확장(LLM 호출 포함)
      retrieve_documents: 90 # 하이브리드 병렬 검색 + SQL
      rerank_documents: 45   # 리랭킹 외곽 가드(리랭커 자체 timeout이 먼저 도달)
      generate_answer: 180   # LLM 답변 생성 — generation 최대 timeout과 정렬
      self_rag_verify: 90    # 품질 검증 + 선택적 재생성
    # 스트리밍 전용: 첫 청크(first-chunk)까지의 최대 대기(초).
    # 첫 토큰이 이 시간 안에 오지 않으면 검증된 비스트리밍 답변으로 폴백한다.
    stream_first_chunk_seconds: 45

  # ==========================================================================
  # 멀티턴 standalone query rewrite - opt-in
  # ==========================================================================
  # 동일 대화방의 후속 질문이 대명사/생략/축약으로 자립적이지 않으면 직전 대화
  # 맥락을 반영한 자립적(standalone) 질문으로 재작성해 검색에 투입한다.
  # 자립적 질문은 휴리스틱 게이트에서 건너뛰어 불필요한 LLM 호출을 막고,
  # 재작성 실패 시 원본 질문으로 graceful 폴백한다(채팅 비파괴).
  # enabled: false면 기존 동작 불변(검색은 후속 질문 단독 수행).
  multiturn_rewrite:
    enabled: false
    # 재작성에 사용할 LLM Factory 선호 provider (fallback_order로 자동 폴백)
    provider: "google"
    # 게이트 패턴은 언어별로 오버라이드 가능 (기본값: 한국어)
    # followup_dependent_patterns: ["그건", "이건", ...]   # 대명사/지시어
    # followup_start_patterns: ["그리고", "추가로", ...]    # 문장 시작 접속사
    # short_question_max_words: 5                          # 짧은 질문 어절 임계치
    # 재작성 프롬프트 템플릿(출력 언어 결정). 생략 시 한국어 기본 템플릿 사용.
    # 플레이스홀더 {session_context}(직전 대화 맥락), {message}(후속 질문)는
    # 런타임에 치환된다. 비한국어 외주는 아래처럼 해당 언어로 교체하세요.
    # prompt_template: |
    #   You rewrite the follow-up question into a standalone search query.
    #   [Context]
    #   {session_context}
    #   [Follow-up]
    #   {message}
    #   [Rewritten standalone question]

  # RRF 점수 정규화 설정 (0~1 범위로 변환, 프론트엔드에서 ×100하여 % 표시)
  # 참고: RRF 공식 = weight / (rrf_k + rank)
  score_normalization:
    enabled: true
    # RRF 상수 (기본값 60, orchestrator.py와 동일해야 함)
    rrf_k: 60
    # 기본 가중치 합 (query_expansion.yaml의 query_weights 합과 일치)
    # [1.0, 0.8, 0.6, 0.4, 0.2] = 3.0
    default_weight_sum: 3.0
    # 출력 범위 (0~1: 프론트엔드에서 ×100하여 퍼센트 표시)
    min_score: 0
    max_score: 1
    # 소수점 자릿수 (0.575 형태로 반환)
    decimal_places: 3

document_processing:
  chunk_size: 1400
  chunk_overlap: 200
  splitter_type: "recursive"
  # doc: 레거시 Word(.doc)는 LibreOffice/soffice가 설치된 환경에서만 변환된다(#26).
  file_types: ["pdf", "txt", "docx", "doc", "pptx", "xlsx", "csv", "html", "md", "json"]
  semantic_threshold: 0.3
  target_chunk_size: 1400
  min_chunk_size: 1100
  max_chunk_size: 1700

  # ==========================================================================
  # 표(xlsx/csv) 행 단위 청킹 (#21) - opt-in, 기본 OFF
  # ==========================================================================
  # 활성화 시 xlsx/csv 표 문서를 행(row) 단위로 묶고 각 청크에 헤더행을 반복
  # 포함해 검색 시 컬럼 의미를 보존한다. enabled=false면 기존 recursive 경로 유지.
  table_chunking:
    enabled: false
    rows_per_chunk: 12       # 청크당 데이터 행 수(대형 표 행 묶음 크기)
    row_overlap: 2           # 청크 간 겹치는 행 수
    include_header_each_chunk: true  # 각 청크 첫머리에 헤더 행 반복 포함

  # ==========================================================================
  # 파일명 연도/분기 메타 추출 (#27) - 기본 ON, 도메인 비종속
  # ==========================================================================
  # 파일명에서 범용 연도(19xx/20xx)와 분기(영어 Q1-4 / 한국어 N분기)를 추출해
  # doc_years/quarter 메타로 주입한다(추출 실패 시 키 미저장). 일본어 第N四半期 등
  # 도메인 특화 분기 패턴은 extra_quarter_patterns로 주입한다(각 패턴의 첫 캡처 그룹이
  # 분기 숫자 1~4를 담아야 함).
  period_extraction:
    enabled: true
    extra_quarter_patterns: []
    # 예) 일본어 분기 패턴 추가:
    # extra_quarter_patterns:
    #   - "第\\s*([1-4])\\s*四半期"

# ==========================================================================
# 스코어링 시스템 설정 (Scoring System)
# ==========================================================================
# 목적: 검색 결과의 가중치를 설정 파일로 제어
# 원칙: 기본값은 모든 가중치 비활성화 (순수 RRF 점수)
# 사용: 도메인 특화가 필요한 경우에만 활성화
#
# Blank System 철학:
#   - 기본값(Default)은 모든 가중치가 비활성화
#   - 도메인 특화가 필요한 사용자만 YAML 설정을 통해 Opt-in으로 활성화
#   - 기존 source_boost를 대체 (레거시 호환성 유지 후 제거 예정)
scoring:
  # -------------------------------------------------------------------------
  # 컬렉션별 가중치 (Collection Weights)
  # -------------------------------------------------------------------------
  # 활성화 시 검색 결과의 출처 컬렉션에 따라 점수에 가중치를 곱함
  # 예: Metadata 컬렉션 결과를 1.5배 부스트
  collection_weight_enabled: false  # 기본값 (환경별: environments/*.yaml에서 오버라이드)

  # 도메인에 맞게 커스터마이징하세요. 추가 컬렉션별 가중치를 설정할 수 있습니다.
  collection_weights:
    Documents: 1.0
    # MyCustomCollection: 1.2

  # -------------------------------------------------------------------------
  # 파일 타입별 가중치 (File Type Weights)
  # -------------------------------------------------------------------------
  # 활성화 시 검색 결과의 파일 타입에 따라 점수에 가중치를 곱함
  # 예: PDF 문서 결과를 1.1배 부스트
  # 참고: 기존 source_boost.weights를 대체
  file_type_weight_enabled: false  # 기본값 (환경별: environments/*.yaml에서 오버라이드)
  
  file_type_weights:
    TXT: 1.0
    PDF: 1.0
    XLSX: 1.0
    JSON: 1.0
    DOCX: 1.0
    # 사용자 정의 파일 타입 추가 가능

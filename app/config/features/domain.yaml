domain:
  # 1. 개인정보 보호 설정 (Privacy)
  privacy:
    # PII 마스킹 시 마스킹 대상에서 제외할 화이트리스트 단어
    # 도메인에 맞게 커스터마이징하세요. 예: ["용어A","용어B"]처럼 자기 도메인의 고유 명사를 추가.
    whitelist:
      - "서비스"
      - "문의"
      - "안내"
      - "확인"
      - "추천"
      - "담당"
      - "고객"
      - "가족"
      - "친구"
    # 이름 마스킹을 위한 호칭 패턴
    name_suffixes:
      - "고객님"
      - "담당자님?"

  # 2. 검색 엔진 설정 (Retrieval)
  retrieval:
    stopwords:
      - "문의"
      - "안내"
      - "확인"
      - "추천"
      - "후기"
    
    # 사용자 사전 (분리 방지 단어)
    user_dictionary:
      - "사용자정의1"
      - "사용자정의2"

    # 동의어 사전 설정
    synonyms:
      csv_path: "app/config/synonyms.csv"
      enabled: false

    # Weaviate 컬렉션별 리턴 프로퍼티
    # 추가 컬렉션이 있으면 아래 형식으로 확장하세요:
    #   MyCollection:
    #     properties:
    #       - "content"
    #       - "custom_field"
    collections:
      Documents:
        properties:
          - "content"
          - "source"
          - "created_at"
          - "source_file"
          - "file_type"
          - "keywords"

  # 3. 데이터 배치 설정 (Batch)
  batch:
    categories:
      domain_1:
        db_id: "default-db-id-1"
        category_name: "도메인1"
        source_file: "source_1"
      domain_2:
        db_id: "default-db-id-2"
        category_name: "도메인2"
        source_file: "source_2"
    
    # 청킹 섹션 분류 키워드
    section_keywords:
      "규정": ["규정", "원칙", "가이드라인"]
      "비용": ["비용", "가격", "원", "만원"]
      "위치": ["위치", "주소", "주차"]
    
    # 청킹 대상 필드
    target_fields:
      - "내용"
      - "설명"

    # 섹션 미분류/기본 헤더 폴백 라벨. 인덱싱 청크의 section/section_class
    # 메타데이터로 저장된다. 미설정 시 코드 한국어 기본("기타"/"일반") 유지(회귀 0).
    # 비한국어 운영자는 자국어 라벨로 지정. 예: default_section_label: "Others"
    default_section_label: null   # classify_section 미분류 폴백(기본 "기타")
    default_section_header: null  # split_by_section_header 기본 헤더(기본 "일반")

    # Notion 속성→본문 결합 시 건너뛸 속성명(제목으로 이미 포함된 엔티티명 컬럼).
    # 미설정/빈 목록이면 코드 기본값({"업체명","이름","Name"})을 사용한다(회귀 0).
    # 비한국/타 도메인 Notion DB는 자신의 제목 속성명을 지정하세요.
    # 예: ["Company", "<자국어 회사명 속성>", "Title"]
    skip_property_keys: []

    # Notion 페이지 제목에서 제거할 접두/마커 문자 목록(특정 워크스페이스 명명 규칙용).
    # 기본 빈 목록 = 제목을 정제하지 않음(notion_extractor.py와 동작 통일, 회귀 0).
    # ★ 등 자신의 워크스페이스 마커를 제거하려면 옵트인하세요. 예: ["★", "●", "◆"]
    title_strip_chars: []

  # 4. 메타데이터 스키마 설정 (Metadata Schema)
  metadata:
    # 규칙 기반 메타데이터 추출기(RuleBasedExtractor)의 카테고리 분류 키워드.
    # 비어 있으면(기본) 카테고리를 추출하지 않는다(도메인 중립 — 잘못된 분류 방지).
    # 자신의 도메인 카테고리를 사용하려면 아래 형식으로 키워드를 정의하세요.
    # 예: "비용": ["가격", "요금"], "절차": ["방법", "이용"]
    category_keywords: {}

    # 콘텐츠 타입(question/instruction/conversation) 추론 마커.
    # null(기본)이면 코드 내장 한국어 기본 마커를 사용한다(회귀 0).
    # '?'(질문)는 언어 중립 신호라 마커와 무관하게 항상 적용된다.
    # 비한국어 운영자는 아래 형식으로 자국어 마커를 정의하세요. 예:
    #   content_type_markers:
    #     question: ["when", "where", "what", "how", "why"]
    #     instruction: ["please", "must", "note"]
    #     conversation: ["hello", "thanks", "inquiry"]
    content_type_markers: null

    # 규칙 기반 메타데이터 추출기(RuleBasedExtractor)의 정규식 패턴.
    # contains_numeric/has_date/has_phone 메타 생성에 사용한다.
    # null(기본)이면 코드 내장 한국 통화/날짜/전화 형식을 사용한다(회귀 0).
    # 다른 통화권/지역 운영자는 자신의 형식 정규식을 지정하세요.
    #   numeric_pattern  — 수치/금액 (한국 기본: 원/만원/₩). 예(USD): "\\$\\d{1,3}(,\\d{3})*"
    #   date_pattern     — 날짜 (한국 기본: 년월일). 예(ISO): "\\d{4}-\\d{2}-\\d{2}"
    #   phone_pattern    — 전화번호 (한국 기본: 02-1234-5678). 예(국제): "\\+\\d{1,3}\\s?\\d{3,4}\\s?\\d{4}"
    numeric_pattern: null
    date_pattern: null
    phone_pattern: null

    # Weaviate 컬렉션 도메인 스키마 필드(옵트인, Domain Schema Fields).
    # 기본(미정의/빈 목록)은 도메인 중립 — 코어 무관 필드만 인덱싱 컬럼으로
    # 생성한다. 임의 메타데이터는 metadata_json(단일 JSON 컬럼)에 무손실로
    # 보존되므로, 아래를 정의하지 않아도 데이터 손실은 없다.
    #
    # 자기 도메인의 특정 필드를 "인덱싱/필터 가능한 컬럼"으로 노출하려면 여기에
    # 정의하세요. 정의 시 코드 변경 없이 (a) Weaviate 스키마 생성,
    # (b) 검색 필터 타입맵, (c) 관리자 샘플 응답에 모두 반영됩니다.
    #
    # type: text | int | number | text_array (생략 시 text)
    # 예시(임의 도메인 — 필드명/설명은 자기 도메인에 맞게 교체):
    #   schema_fields:
    #     - name: entity_name
    #       type: text
    #       description: 엔티티 이름(예: item_title)
    #     - name: field_a
    #       type: text
    #       description: 도메인 특화 필드 A
    #     - name: category
    #       type: text
    #       description: 분류/카테고리
    #     - name: quantity
    #       type: text
    #       description: 수량/한도
    #     - name: score
    #       type: text
    #       description: 점수/등급
    # 간단 매핑 형식도 허용: schema_fields: {field_a: text, quantity: text}
    schema_fields: []

    # 관리자 분석(/api/admin/weaviate/analytics)의 "엔티티 분포" 통계가
    # 집계할 메타데이터 필드명. 미설정(null) 시 기본 "entity_name"으로
    # 폴백한다. 자기 도메인의 엔티티 라벨 필드를 다른 이름으로 쓰면
    # 여기에 지정하세요(예: item_title). 코드 수정 없이 통계가 반영됩니다.
    entity_distribution_field: null

    schema:
      required_fields: ["name"]
      numeric_fields:
        - "numeric_value"
        - "amount"
      boolean_fields:
        - "is_active"
      field_aliases:
        "Name": "이름"
        "Phone": "전화번호"
        "Category": "분류"
        "Location": "위치"

      # 메타데이터 값 파싱 규칙(통화/날짜/불리언/null 토큰).
      # GenericMetadataSchema.parse_currency/parse_date/parse_boolean이 사용한다
      # (notion 인제스천 라이브 경로). 아래 항목을 정의하지 않으면(기본) 코드 내장
      # 한국어 + 언어 중립 기본값을 사용한다(회귀 0). 각 키는 '대체'한다(병합 아님).
      #
      # ⚠️ 언어 중립 fallback은 항상 유지된다(설정으로 끌 수 없음):
      #   - 순수 숫자 추출(예: "12345" → 12345)
      #   - ISO(YYYY-MM-DD)/점표기(2025.01.01) 날짜
      #
      # 비한국/타 통화권 운영자 예시(USD + 자국어 날짜/불리언 토큰):
      #   parsing:
      #     null_tokens: ["null", "none", "n/a", "-"]
      #     currency:
      #       strip_symbols: ["$", ",", " "]
      #       unit_multipliers: {"k": 1000, "m": 1000000}
      #     date_patterns:
      #       - "(\\d{4})[./-](\\d{1,2})[./-](\\d{1,2})"  # (year, month, day) 3그룹
      #     boolean_true_tokens: ["true", "o", "yes"]
      #     boolean_false_tokens: ["false", "x", "no"]
      parsing: {}

  # 5. SQL 검색 설정 (SQL Search)
  sql_search:
    tables:
      - "metadata_table"
    numeric_fields:
      - "numeric_value"
      - "amount"

  # 5.5 생성 페르소나 (Generation Persona)
  # 생성 시스템/스타일 프롬프트의 도메인 플레이스홀더({domain_name} 등)를
  # 채우는 값. generator가 프롬프트 로드 직후 이 값으로 치환하므로, 어느 프롬프트
  # 소스(시드/DB/커스텀)든 placeholder 토큰이 LLM에 리터럴로 누출되지 않는다.
  # 미설정/누락 키는 코드 내장 중립 기본값으로 폴백한다(회귀 0). 자기 도메인
  # 페르소나를 코드 수정 없이 주입하려면 아래를 정의하세요.
  #   예(임의 도메인): generation: {domain_name: "<도메인명>", system_role: "<도메인명> 상담 어시스턴트"}
  generation:
    domain_name: ""          # 도메인 명사(예: "<도메인명>"). 빈 값이면 중립.
    system_role: ""          # 어시스턴트 역할 한 줄. 빈 값이면 코드 중립 기본.
    domain_description: ""    # 도메인/답변 설명 한 줄. 빈 값이면 코드 중립 기본.
    domain_context: ""        # 상세 스타일 프롬프트의 <context> 본문(선택).
    domain_examples: ""       # 상세 스타일 프롬프트의 <examples> 본문(선택).
    response_guidelines: ""   # 상세 스타일 프롬프트의 응답 지침(선택).

  # 6. 라우터 설정 (Router)
  router:
    domain_name: "general_service"
    messages:
      greeting: "안녕하세요! 👋 무엇을 도와드릴까요?"
      farewell: "안녕히 가세요! 이용해 주셔서 감사합니다."
      thanks: "도움이 되셨다니 기쁩니다! 😊 더 궁금하신 점이 있으시면 언제든 물어보세요!"
      default_greeting: "안녕하세요! 궁금한 점을 말씀해주세요."
      out_of_scope: |
        죄송합니다. 해당 질문은 서비스 범위를 벗어납니다. 🙏
        서비스 관련 질문을 해주시면 도와드리겠습니다!
      # 차단 케이스 사용자 노출 메시지 (미설정 시 코드 기본값과 동일 — 회귀 0)
      prompt_injection: "🚫 보안상의 이유로 요청을 처리할 수 없습니다."
      harmful_content: "⚠️ 부적절한 내용이 포함되어 있습니다."

    # 인사말/잡담 분류용 트리거 키워드
    # 비한국어 외주는 아래 목록을 해당 언어 키워드로 교체하세요.
    # 설정이 없으면 코드의 한국어 기본 목록을 사용합니다(하위 호환).
    greeting_triggers:
      farewell: ["잘가", "안녕히", "bye", "goodbye", "바이"]
      thanks: ["고마", "감사", "thank", "thx", "ㄱㅅ", "땡큐"]
      greeting: ["안녕", "hello", "hi", "헬로", "하이", "ㅎㅇ", "방가"]

    # PROCEDURAL(절차/방법) 인텐트 추론 키워드.
    # 쿼리에 아래 키워드가 포함되면 검색 의도를 PROCEDURAL로 분류한다.
    # 비어 있거나(설정 없음) 리스트가 아니면 코드 기본값(["방법","어떻게","규칙"])을
    # 사용한다(회귀 0). 비한국어 운영자는 해당 언어 키워드로 교체하세요.
    # 예시(영어): ["how to", "method", "procedure", "rule"]
    procedural_intent_keywords: ["방법", "어떻게", "규칙"]

    # 라우터 분류 프롬프트 전체 템플릿(언어 자체 오버라이드용).
    # null(기본)이면 코드 내장 한국어 템플릿을 사용한다(회귀 0).
    # 비한국어 운영자는 아래에 자국어 지시문 템플릿을 직접 작성할 수 있다.
    # 사용 가능한 자리표시자(placeholder):
    #   {system_role} {domain_desc} {rag_categories_str}
    #   {structured_desc} {general_desc} {both_desc}
    #   {structured_entities_str} {structured_keywords_str}
    #   {general_keywords_str} {both_keywords_str} {oos_examples_str}
    #   {context} {query}  ← 런타임에 대화이력/사용자질문으로 치환됨
    # 예시:
    #   prompt_template: |
    #     <system_instructions>
    #     You are {system_role}. {domain_desc}
    #     ...
    #     </system_instructions>
    #     <user_query>{query}</user_query>
    #     <response_format>{ "needs_rag": boolean, ... }</response_format>
    prompt_template: null

    system_role: "전문 서비스 지원 챗봇의 쿼리 분석 전문가"
    domain_description: "사용자의 질문에 대해 보유한 지식 베이스를 바탕으로 정확한 답변을 제공합니다."
    
    # RAG 검색이 필요한 카테고리 정의
    rag_categories:
      - name: "정보 검색"
        description: "구체적인 정보 요청"
      - name: "절차 안내"
        description: "이용 방법 및 절차 문의"

    # 데이터 소스 판단 로직 (Structured vs General)
    data_sources:
      structured:
        description: "구조화된 메타데이터 우선"
        triggers:
          entities: []
          keywords: ["가격", "비용", "규정"]
      
      general:
        description: "일반 문서 정보 우선"
        triggers:
          keywords: ["추천", "방법", "안내"]
      
      both:
        description: "혼합 검색"
        triggers:
          keywords: ["후기", "비교"]

    # 범위 이탈 예시
    out_of_scope_examples:
      - "오늘 날씨 어때?"
      - "주식 투자 추천해줘"

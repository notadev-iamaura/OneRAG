# 쿼리 라우팅 설정
# 기능: 사용자 쿼리를 분석하여 적절한 처리 경로 선택
# 사용: Rule-based 및 OpenRouter 통합 LLM 기반 라우터 설정

# Query Routing Configuration (RootConfig 필수 필드)
# LLMQueryRouter가 참조하는 설정 (llm_query_router.py:134-135)
query_routing:
  # Phase 2: LLM 라우터 활성화
  # 정형 데이터 질문 (비용 비교, 최대/최소 등)을 SQL 우선 처리
  enabled: true
  llm_router:
    enabled: true  # ✅ 활성화
    provider: "openrouter"
    model: "google/gemini-2.5-flash-lite"
    temperature: 0.0
    max_tokens: 1024
  cache_ttl: 3600
  # 즉시 응답 설정 (인사말, 범위 외 질문)
  direct_answer:
    enabled: true
  
  # ========================================
  # A경로: 엔티티 규정 검색 (노션 우선)
  # Phase 2 PRD 요구사항: 특정 엔티티 질문 시 노션 90% 비중
  # ========================================
  data_source_routing:
    enabled: true  # false로 변경 시 즉시 비활성화 (롤백)
    
    # ⚠️ [DEPRECATED] score_multipliers는 rag.yaml의 scoring 섹션으로 이관됨 (2026-01-02)
    # 
    # 새로운 설정 위치: app/config/features/rag.yaml
    # 
    # scoring:
    #   collection_weight_enabled: true   # 활성화
    #   collection_weights:
    #     Documents: 1.0
    #     MyCollection: 1.5              # 사용자 정의 컬렉션 부스트
    #   file_type_weight_enabled: true    # 파일 타입별 가중치 (선택)
    #   file_type_weights:
    #     PDF: 1.2
    #     TXT: 1.1
    #
    # 마이그레이션 가이드: DOMAIN_CUSTOMIZATION_GUIDE.md 참조
    
    # 기본값 (LLM 응답 없거나 오류 시)
    default_data_source: "general"

    # ========================================
    # data_source → 검색 메타데이터 필터 매핑 (GAP G)
    # ========================================
    # 라우터가 판단한 data_source(structured/general/both)를 실제 검색 단계의
    # 메타데이터 필터로 변환한다. 같은 대화방에서 질문 주제가 바뀌면 data_source가
    # 매 요청 재판단되어 검색 대상이 자동 전환된다.
    #
    # ⚠️ 기본값은 비어있음({}) — 운영자가 명시 설정하기 전까지는 추가 필터 없이
    #    기존 검색 동작과 100% 동일하게 동작한다(no-op, 회귀 0). 핵심 안전장치이므로
    #    비즈니스 규칙이 확정되기 전에는 비워 두어야 한다.
    #
    # 설정 방법: 각 data_source 키 아래에 "메타필드: 값" 형태로 작성하면, 검색 시
    #   해당 필터가 기존 filters에 병합된다(기존 키는 보존). 키는 색인된 문서
    #   metadata의 필드명과 일치해야 한다(예: doc_category, source_type 등).
    #
    # 예시 (운영자가 채울 때):
    # filter_mappings:
    #   structured:
    #     doc_category: "regulation"   # 가격/비용/규정 문서 그룹
    #   general:
    #     doc_category: "guide"        # 추천/방법/안내 문서 그룹
    #   # both는 매핑을 생략하면 추가 필터 없음(전체 검색)
    filter_mappings: {}

    # 디버깅 및 모니터링
    log_score_changes: true  # 스코어 조정 전후 로그 출력
    log_collection_stats: true  # 컬렉션별 통계 로그

routing:
  enabled: true
  default_route: "rag"
  timeout_seconds: 10

  # 규칙 기반 라우터(RuleBasedRouter)의 매칭 언어.
  # routing_rules_v2.yaml의 keywords[language]/response[language] 세트를 선택한다.
  # 기본 "ko"이면 기존 동작과 완전히 동일하다(회귀 0).
  # 비한국어 운영자는 "en"으로 바꿔 routing_rules_v2.yaml에 이미 정의된
  # 영어 키워드/응답(인사·차단·거부 등) 세트와 service_keywords.en을 활성화한다.
  # (ja 등 추가 언어는 routing_rules_v2.yaml에 해당 keywords[ja]/response[ja]를
  #  추가한 뒤 이 값을 "ja"로 설정하면 된다.)
  language: "ko"

  # 세션 메타용 토픽 분류 키워드(cosmetic 라벨 — 검색/라우팅 미영향).
  # di_container.extract_topic / ChatService.extract_topic 단일 소스가 참조한다.
  # 비어 있거나 미설정(기본)이면 코드 내장 한국어 기본 맵을 사용한다(회귀 0).
  # 비한국어 운영자는 아래 형식으로 자국어 키워드를 추가한다. 예:
  #   topic_keywords:
  #     search: ["search", "find", "lookup"]
  #     help: ["help", "how", "guide"]
  topic_keywords: {}

  rule_based:
    enabled: true

  # ========================================
  # OpenRouter 통합 LLM 라우터 설정
  # ========================================
  # 정확도 우선 - 낮은 temperature로 일관된 라우팅

  llm_router:
    enabled: true  # ✅ 활성화

    # OpenRouter 게이트웨이 사용
    provider: "openrouter"

    # 경량 모델 - 빠른 라우팅 판단
    # Gemini 2.5 Flash Lite - 초경량 빠른 응답
    model: "google/gemini-2.5-flash-lite"

    # API 설정 (OpenRouter 단일 키)
    api_key: "${OPENROUTER_API_KEY:-}"

    # 요청 파라미터
    temperature: 0.2  # 정확도 우선 (낮은 온도)
    max_tokens: 300
    timeout: 10

    # 레거시 파라미터 (OpenAI 호환용)
    verbosity: "low"  # 빠른 판단

    # Fallback 설정
    defaults:
      verbosity: "low"
      temperature: 0.2

  complexity:
    simple_threshold: 0.3
    moderate_threshold: 0.6

    # ComplexityCalculator(Self-RAG 라우팅용) 마커 외부화.
    # depth_indicators: 분석성(깊이) 질문 판단 마커. null(기본)이면
    #   코드 내장 한국어 기본 마커를 사용한다(회귀 0).
    # multi_intent_indicators: 다중 의도 판단 마커. null(기본)이면 한국어 기본값 사용.
    # 비한국어 운영자는 아래에 자국어 마커 리스트를 작성한다. 예:
    #   depth_indicators: ["how", "why", "difference", "compare", "step", "reason"]
    #   multi_intent_indicators: ["and", "or", "also", "additionally", "then"]
    depth_indicators: null
    multi_intent_indicators: null
    # 언어 중립 다중 의도 신호(세미콜론/and·or/물음표) 보강 토글.
    # false(기본)이면 기존 한국어 마커 점수와 완전히 동치다(회귀 0).
    # true로 켜면 마커가 매칭되지 않는 언어에서도 병렬 신호로 점수를 보강한다.
    use_language_neutral_signals: false

# =====================================================
# Prompts 설정 (Hybrid Mode: PostgreSQL + JSON)
# =====================================================
# 프롬프트 관리 시스템 설정
#
# Hybrid Mode:
# - Primary: PostgreSQL (영구 데이터 저장)
# - Fallback: JSON (로컬 파일, Railway 재배포 시 손실 가능)
#
# 마이그레이션 가이드:
# - Railway 배포 환경: use_database=true (PostgreSQL 사용)
# - 로컬 개발 환경: use_database=false (JSON 사용)

prompts:
  # PostgreSQL 사용 여부 (Hybrid Mode)
  use_database: ${USE_DATABASE:-true}  # 기본값: true (PostgreSQL 사용)

  # 프롬프트 내용 캐시 TTL(초). generator가 매 답변 생성 시 조회하는 프롬프트의
  # 반복 DB 조회를 줄인다. 프롬프트 수정 시 즉시 무효화되어 최대 이 시간 내 반영됨.
  # 0으로 설정하면 캐시 비활성화 (항상 최신, DB 조회 매번).
  cache_ttl: 60

  # JSON 폴백 설정 (로컬 파일 경로)
  storage_path: "./data/prompts"  # JSON 파일 저장 경로

  # 초기화 설정
  initialize_on_startup: true  # 서버 시작 시 Repository 초기화

  # 빈 저장소(fresh 배포) 첫 부팅 시 시드할 기본 프롬프트 목록 오버라이드.
  # null(기본)이면 코드 내장 DEFAULT_SEED_PROMPTS(한국어 기본 시드)를 사용한다 → 회귀 0.
  # 비한국어/타 도메인 운영자는 자국어 시드 프롬프트 목록을 여기에 정의해
  # 코드 포크 없이 시드를 교체할 수 있다. 각 항목은
  # {name, content, description, category, is_active} 구조.
  seed_prompts: null

# 답변 생성 설정
# 기능: 사용자에게 제공하는 최종 답변 생성용 LLM 설정
# 사용: Google Gemini 기본, OpenRouter 사용 시 환경변수로 전환
#
# ⚠️ llm.yaml과 통합 금지 — 용도가 다른 독립 섹션입니다.
#   - generation.* : 사용자 답변 생성 LLM (이 파일) — 품질 우선
#   - llm.*        : 내부 보조 LLM (쿼리 재작성/확장) — 지연 우선
#   온도/타임아웃 값 차이는 드리프트가 아니라 의도입니다.

generation:
  # ========================================
  # 출력 언어 (범용성)
  # ========================================
  # 답변 생성 시 LLM에 지시할 출력 언어. 비한국어 외주 프로젝트는 이 값만
  # 변경하면 코드 수정 없이 해당 언어로 답변한다. (예: "English", "日本語")
  # 주의: response_language="ko"(기본) 프로파일에서만 이 문자열이 프롬프트에
  # 치환된다. response_language를 en/ja로 두면 해당 언어가 직접 고정된다.
  output_language: "한국어"

  # ========================================
  # 응답 프로파일 언어 (다국어 응답 프로파일, GAP #2)
  # ========================================
  # 답변 프롬프트의 시스템 규칙·응답 포맷·발췌 폴백·보안 거부·무문서 안내를
  # 언어별 프로파일로 강제한다. 지원: ko(기본), en, ja.
  #  - ko: 기존 한국어 동작 보존(출력 언어는 output_language로 추가 제어)
  #  - en/ja: 해당 언어로 답변 강제(output_language 무시)
  # 요청 단위 제어: API options.response_language가 이 설정보다 우선한다.
  # 미지정/미지원 코드는 기본 ko로 폴백한다(하위 호환, 회귀 0).
  response_language: "ko"

  # ========================================
  # 답변 완전성 스캐폴딩 (GAP #3) - opt-in
  # ========================================
  # 검색 컨텍스트에서 QA 답변에 자주 누락되는 핵심 근거값(URL/이메일/연락처/
  # 규격번호/모델번호)과 인용구, 문서 메타를 추출해 프롬프트 상단에 <source_signals>
  # /<answer_checklist>/<source_metadata> 블록으로 재배치한다. RAG 답변이 1개만
  # 보고 끝내는 누락을 막는 정석 기법이다.
  # 정규식 패턴은 도메인 중립(URL/email/contact/spec/model)만 사용한다.
  # 기본 false=비활성(기존 프롬프트 구조 그대로, 회귀 0). 추출값이 없으면 빈 블록을
  # 만들지 않는다.
  answer_completeness:
    enabled: false

    # ────────────────────────────────────────────────────────────────
    # 트리거 마커·고가치 용어 외부화 (#4 범용화)
    # ────────────────────────────────────────────────────────────────
    # answer_checklist 활성 트리거 마커와 고가치 사실 패턴의 언어 의존 부분을
    # 코드가 아닌 설정으로 외부화한다. 미설정 시 코드 기본(한국어 최소셋)을
    # 사용한다(회귀 0). 외국어/도메인 운영자는 코드 포크 없이 해당 언어/도메인의
    # 마커·용어를 채워 동일 기능을 발현시킬 수 있다.
    #
    # trigger_markers: 질문에 이 마커가 포함되면 <answer_checklist> 블록을 생성.
    #   설정하면 코드 기본(한국어 마커)을 '대체'한다(병합 아님).
    # trigger_markers: ["key facts", "contact", "date", "price", "model"]
    #
    # high_value_terms: 체크리스트 후보 라인 점수에서 +2 가중을 받는 언어 의존 용어.
    #   언어 중립 기반(URL/이메일/연락처/규격/모델 라벨)은 항상 적용되고, 아래
    #   units(숫자 뒤 단위)/keywords(단독 키워드)만 교체된다.
    # high_value_terms:
    #   units: ["원", "년", "월", "일", "%", "kg"]
    #   keywords: ["회사명", "제품명", "기관", "조건", "규격", "모델"]

  # ========================================
  # 기본 프로바이더 설정
  # ========================================
  # Google Gemini를 기본값으로 사용 (Quickstart 호환, 무료 API 키)
  # OpenRouter 사용 시: GENERATION_PROVIDER=openrouter 환경변수 설정

  # 기본 프로바이더 (모든 환경에서 google 사용)
  default_provider: "google"

  # Fallback은 모델 레벨에서 처리
  auto_fallback: true

  # 모델 Fallback 순서 (OpenRouter 모델 형식)
  # 기본 모델 실패 시 Claude 3.5 Haiku로 폴백
  fallback_models:
    - "anthropic/claude-3.5-haiku"  # 1순위: Claude 3.5 Haiku (빠르고 저렴)

  # ========================================
  # OpenRouter 설정
  # ========================================
  openrouter:
    # API 설정
    api_key: "${OPENROUTER_API_KEY:-}"
    base_url: "https://openrouter.ai/api/v1"

    # 기본 모델 (default_model) - 빠르고 안정적인 OpenRouter 모델
    default_model: "google/gemini-2.5-flash"

    # 공통 설정
    temperature: 0.2
    max_tokens: 20000
    timeout: 150

    # OpenRouter 메타데이터 (선택적)
    site_url: ""
    app_name: "RAG-Chatbot"

  # ========================================
  # Google Gemini 직접 설정 (Quickstart용)
  # ========================================
  # GENERATION_PROVIDER=google 환경변수로 활성화
  # GOOGLE_API_KEY 필요 (무료: https://aistudio.google.com/apikey)
  google:
    api_key: "${GOOGLE_API_KEY:-}"
    default_model: "${LLM_MODEL:-gemini-2.0-flash}"
    temperature: 0.2
    max_tokens: 20000
    timeout: 150
    # Google provider는 Fallback 비활성화 (무료 티어 보호)
    # OpenRouter 형식 모델명이 Google API에서 인식되지 않음
    auto_fallback: false

  # ========================================
  # 모델별 설정 (OpenRouter 모델 형식)
  # ========================================
  # 각 모델의 특성에 맞는 파라미터 오버라이드

  models:
    # === Google Gemini 시리즈 (기본) ===
    "google/gemini-2.5-flash-lite":
      description: "Gemini 2.5 Flash Lite - 라우팅/리랭킹/쿼리확장용"
      temperature: 0.3
      max_tokens: 8000
      timeout: 30

    "google/gemini-2.5-flash":
      description: "Gemini 2.5 Flash - 빠른 응답"
      temperature: 0.3
      max_tokens: 16000
      timeout: 60

    # === Anthropic Claude 시리즈 ===
    "anthropic/claude-sonnet-4.5":
      description: "Claude Sonnet 4.5 - 균형잡힌 성능과 비용"
      temperature: 0.2
      max_tokens: 20000
      timeout: 120

    "anthropic/claude-3.5-haiku":
      description: "Claude 3.5 Haiku - Fallback 모델 (빠르고 저렴)"
      temperature: 0.3
      max_tokens: 8000
      timeout: 60

    # === OpenAI GPT 시리즈 ===
    "openai/gpt-5.1":
      description: "GPT-5.1 - 최신 추론 모델"
      # GPT-5는 temperature 고정 (1.0)
      max_tokens: 20000
      timeout: 180
      # GPT-5 전용 파라미터
      verbosity: "medium"
      reasoning_effort: "medium"

    "openai/gpt-4.1":
      description: "GPT-4.1 - 안정적인 범용 모델"
      temperature: 0.3
      max_tokens: 16000
      timeout: 120

  # ========================================
  # 레거시 호환성 (deprecated, 제거 예정)
  # ========================================
  # 기존 코드 호환을 위해 유지, 새 코드에서는 사용하지 않음
  providers: ["openrouter"]
  fallback_order: ["openrouter"]

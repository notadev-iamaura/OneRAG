# LLM 제공자 설정 (OpenRouter 통합) — 내부 보조 LLM 전용
# 기능: 쿼리 재작성/확장(LLMClientFactory, gpt5_engine 등) 등 내부 보조 호출용 설정
# 사용: 단일 API 키로 300+ 모델 접근 (https://openrouter.ai/models)
#
# ⚠️ generation.yaml과 통합 금지 — "중복"이 아니라 용도가 다른 독립 섹션입니다.
#   - llm.*        : 내부 보조 LLM (쿼리 재작성, 확장 등) — 짧은 출력, 낮은 지연 우선
#   - generation.* : 사용자 답변 생성 LLM — 품질 우선
#   온도/타임아웃 값이 다른 것은 드리프트가 아니라 의도입니다.
#   (예: llm.timeout=120 vs generation.timeout=150)

# ========================================
# OpenRouter 통합 모드 (단일 게이트웨이)
# ========================================
# 모든 LLM 호출을 OpenRouter로 통합하여 관리 단순화
# 장점:
#   - 단일 API 키로 다양한 모델 사용
#   - 통합 청구 및 사용량 관리
#   - 모델별 fallback 자동 처리
#   - OpenAI SDK 호환 인터페이스

llm:
  # 기본 프로바이더 (항상 openrouter)
  default_provider: "openrouter"

  # 레거시 호환성 (deprecated)
  providers: ["openrouter"]
  auto_fallback: true
  fallback_order: ["openrouter"]

  # ========================================
  # OpenRouter 설정
  # ========================================
  openrouter:
    # API 설정
    api_key: "${OPENROUTER_API_KEY:-}"
    base_url: "https://openrouter.ai/api/v1"

    # 기본 모델 - 빠르고 안정적인 OpenRouter 모델
    default_model: "google/gemini-2.5-flash"

    # 공통 설정
    temperature: 0.3
    max_tokens: 20000
    timeout: 120

    # OpenRouter 메타데이터 (선택적)
    site_url: ""
    app_name: "RAG-Chatbot"

  # ========================================
  # 모델별 설정 (OpenRouter 모델 형식)
  # ========================================
  # 각 모델의 특성에 맞는 파라미터 오버라이드

  models:
    # === Anthropic Claude 시리즈 ===
    "anthropic/claude-sonnet-4.5":
      description: "Claude Sonnet 4.5 - 균형잡힌 성능과 비용"
      temperature: 0.2
      max_tokens: 20000
      timeout: 120

    "anthropic/claude-3.5-haiku":
      description: "Claude 3.5 Haiku - Fallback 모델 (빠르고 저렴)"
      temperature: 0.3
      max_tokens: 8000
      timeout: 60

    # === Google Gemini 시리즈 ===
    "google/gemini-2.5-flash-lite":
      description: "Gemini 2.5 Flash Lite - 초경량 빠른 응답"
      temperature: 0.3
      max_tokens: 8000
      timeout: 30

    "google/gemini-2.5-flash":
      description: "Gemini 2.5 Flash - 빠른 응답"
      temperature: 0.3
      max_tokens: 16000
      timeout: 60

    # === OpenAI GPT 시리즈 ===
    "openai/gpt-5.1":
      description: "GPT-5.1 - 최신 추론 모델"
      # GPT-5는 temperature 고정 (1.0)
      max_tokens: 20000
      timeout: 180
      # GPT-5 전용 파라미터
      verbosity: "medium"
      reasoning_effort: "medium"

    "openai/gpt-4.1":
      description: "GPT-4.1 - 안정적인 범용 모델"
      temperature: 0.3
      max_tokens: 16000
      timeout: 120

  # ========================================
  # Fallback 모델 순서
  # ========================================
  # 기본 모델 실패 시 Claude 3.5 Haiku로 폴백
  fallback_models:
    - "anthropic/claude-3.5-haiku"  # 1순위: Claude 3.5 Haiku (빠르고 저렴)

  # ========================================
  # Ollama 로컬 LLM 설정
  # ========================================
  # API 키 없이 로컬에서 LLM 사용 (에어갭 환경 지원)
  # Ollama 서버 실행 필요: https://ollama.com
  # Ollama가 미실행 시에도 서버 기동에 영향 없음 (지연 초기화)

  ollama:
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    model: "llama3.2"
    temperature: 0.7
    max_tokens: 2048
    timeout: 300

  # ========================================
  # 레거시 설정 (deprecated - 제거 예정)
  # ========================================
  # 기존 코드 호환을 위해 유지, 새 코드에서는 사용하지 않음

  google:
    # Quickstart용: 직접 Google Gemini API 사용
    # GOOGLE_API_KEY 환경변수 필요 (무료: https://aistudio.google.com/apikey)
    model: "${LLM_MODEL:-gemini-2.0-flash}"
    api_key: "${GOOGLE_API_KEY:-}"
    temperature: 0.3
    max_tokens: 20000

  anthropic:
    model: "anthropic/claude-sonnet-4.5"  # OpenRouter 형식
    api_key: "${OPENROUTER_API_KEY:-}"
    temperature: 0.3
    max_tokens: 20000

  openai:
    model: "openai/gpt-4.1"  # OpenRouter 형식
    api_key: "${OPENROUTER_API_KEY:-}"
    temperature: 0.3
    max_tokens: 20000
    verbosity: "medium"
    reasoning_effort: "medium"
